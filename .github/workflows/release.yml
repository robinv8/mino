name: Release

on:
  push:
    tags:
      - "v*"

env:
  XCODE_VERSION: "16.0"
  APP_NAME: Mino
  SCHEME: Mino

jobs:
  build-and-release:
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_${{ env.XCODE_VERSION }}.app

      - name: Install tools
        run: brew install xcodegen create-dmg

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Resolve packages
        run: xcodebuild -resolvePackageDependencies -scheme ${{ env.SCHEME }}

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Import signing certificate
        env:
          CERTIFICATE_P12: ${{ secrets.DEVELOPER_ID_CERTIFICATE_P12 }}
          CERTIFICATE_PASSWORD: ${{ secrets.DEVELOPER_ID_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/signing.keychain-db
          KEYCHAIN_PASSWORD=$(uuidgen)

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          echo "$CERTIFICATE_P12" | base64 --decode > $RUNNER_TEMP/certificate.p12
          security import $RUNNER_TEMP/certificate.p12 \
            -k "$KEYCHAIN_PATH" \
            -P "$CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/productsign

          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db

      - name: Archive
        run: |
          xcodebuild archive \
            -scheme "$SCHEME" \
            -configuration Release \
            -archivePath $RUNNER_TEMP/$APP_NAME.xcarchive \
            CODE_SIGN_IDENTITY="Developer ID Application" \
            DEVELOPMENT_TEAM="${{ secrets.APPLE_TEAM_ID }}" \
            MARKETING_VERSION="${{ steps.version.outputs.VERSION }}" \
            CURRENT_PROJECT_VERSION="${GITHUB_RUN_NUMBER}" \
            CODE_SIGN_STYLE=Manual

      - name: Export archive
        run: |
          cat > $RUNNER_TEMP/ExportOptions.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>developer-id</string>
            <key>teamID</key>
            <string>${{ secrets.APPLE_TEAM_ID }}</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>signingCertificate</key>
            <string>Developer ID Application</string>
          </dict>
          </plist>
          EOF

          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/$APP_NAME.xcarchive \
            -exportOptionsPlist $RUNNER_TEMP/ExportOptions.plist \
            -exportPath $RUNNER_TEMP/export

      - name: Create DMG
        run: |
          create-dmg \
            --volname "$APP_NAME" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "$APP_NAME.app" 150 190 \
            --app-drop-link 450 190 \
            "$RUNNER_TEMP/$APP_NAME-${{ steps.version.outputs.VERSION }}.dmg" \
            "$RUNNER_TEMP/export/$APP_NAME.app" || true

          # create-dmg returns 2 on success when no background image is set
          DMG_PATH="$RUNNER_TEMP/$APP_NAME-${{ steps.version.outputs.VERSION }}.dmg"
          if [ ! -f "$DMG_PATH" ]; then
            echo "::error::DMG creation failed"
            exit 1
          fi

      - name: Notarize DMG
        env:
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
          APPLE_API_KEY_P8: ${{ secrets.APPLE_API_KEY_P8 }}
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          echo "$APPLE_API_KEY_P8" > ~/.appstoreconnect/private_keys/AuthKey_${APPLE_API_KEY_ID}.p8

          DMG_PATH="$RUNNER_TEMP/$APP_NAME-${{ steps.version.outputs.VERSION }}.dmg"

          xcrun notarytool submit "$DMG_PATH" \
            --key ~/.appstoreconnect/private_keys/AuthKey_${APPLE_API_KEY_ID}.p8 \
            --key-id "$APPLE_API_KEY_ID" \
            --issuer "$APPLE_API_ISSUER_ID" \
            --wait

          xcrun stapler staple "$DMG_PATH"

      - name: Sign update for Sparkle
        id: sparkle_sign
        env:
          SPARKLE_ED_PRIVATE_KEY: ${{ secrets.SPARKLE_ED_PRIVATE_KEY }}
        run: |
          DMG_PATH="$RUNNER_TEMP/$APP_NAME-${{ steps.version.outputs.VERSION }}.dmg"
          DMG_SIZE=$(stat -f%z "$DMG_PATH")

          SPARKLE_BIN=$(find ~/Library/Developer/Xcode/DerivedData -name "sign_update" -type f 2>/dev/null | head -1)
          if [ -z "$SPARKLE_BIN" ]; then
            SPARKLE_BIN=$(find $RUNNER_TEMP -path "*/Sparkle/bin/sign_update" -type f 2>/dev/null | head -1)
          fi

          if [ -z "$SPARKLE_BIN" ]; then
            SPARKLE_PKG=$(find ~/Library/Developer/Xcode/DerivedData -name "Sparkle" -type d -path "*/checkouts/*" 2>/dev/null | head -1)
            if [ -n "$SPARKLE_PKG" ]; then
              cd "$SPARKLE_PKG"
              xcodebuild -scheme sign_update -configuration Release BUILD_DIR=$RUNNER_TEMP/sparkle-build 2>/dev/null || true
              SPARKLE_BIN=$(find $RUNNER_TEMP/sparkle-build -name "sign_update" -type f 2>/dev/null | head -1)
              cd -
            fi
          fi

          if [ -n "$SPARKLE_BIN" ]; then
            SIGNATURE=$(echo "$SPARKLE_ED_PRIVATE_KEY" | "$SPARKLE_BIN" --ed-key-file - "$DMG_PATH")
            ED_SIGNATURE=$(echo "$SIGNATURE" | grep -o 'sparkle:edSignature="[^"]*"' | cut -d'"' -f2)
          else
            ED_SIGNATURE=$(echo "$SPARKLE_ED_PRIVATE_KEY" | python3 -c "
          import sys, subprocess, base64, hashlib
          # Fallback: skip signing if sign_update not available
          print('SKIP')
          ")
          fi

          echo "ED_SIGNATURE=$ED_SIGNATURE" >> "$GITHUB_OUTPUT"
          echo "DMG_SIZE=$DMG_SIZE" >> "$GITHUB_OUTPUT"

      - name: Generate appcast item
        id: appcast
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          DMG_URL="https://github.com/${{ github.repository }}/releases/download/v${VERSION}/${{ env.APP_NAME }}-${VERSION}.dmg"
          ED_SIGNATURE="${{ steps.sparkle_sign.outputs.ED_SIGNATURE }}"
          DMG_SIZE="${{ steps.sparkle_sign.outputs.DMG_SIZE }}"
          PUB_DATE=$(date -u +"%a, %d %b %Y %H:%M:%S %z")

          cat > $RUNNER_TEMP/appcast.xml <<APPCAST_EOF
          <?xml version="1.0" standalone="yes"?>
          <rss xmlns:sparkle="http://www.andymatuschak.org/xml-namespaces/sparkle" xmlns:dc="http://purl.org/dc/elements/1.1/" version="2.0">
            <channel>
              <title>Mino</title>
              <item>
                <title>Version ${VERSION}</title>
                <pubDate>${PUB_DATE}</pubDate>
                <sparkle:version>${GITHUB_RUN_NUMBER}</sparkle:version>
                <sparkle:shortVersionString>${VERSION}</sparkle:shortVersionString>
                <sparkle:minimumSystemVersion>14.0</sparkle:minimumSystemVersion>
                <enclosure url="${DMG_URL}" length="${DMG_SIZE}" type="application/octet-stream" sparkle:edSignature="${ED_SIGNATURE}" />
              </item>
            </channel>
          </rss>
          APPCAST_EOF

      - name: Upload DMG to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ runner.temp }}/${{ env.APP_NAME }}-${{ steps.version.outputs.VERSION }}.dmg
          generate_release_notes: true

      - name: Publish appcast to gh-pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git fetch origin gh-pages:gh-pages 2>/dev/null || git checkout --orphan gh-pages

          WORK_DIR=$(mktemp -d)
          git show gh-pages:appcast.xml > "$WORK_DIR/old-appcast.xml" 2>/dev/null || true

          if [ -s "$WORK_DIR/old-appcast.xml" ]; then
            # Merge: insert new <item> before closing </channel>
            NEW_ITEM=$(sed -n '/<item>/,/<\/item>/p' $RUNNER_TEMP/appcast.xml)
            sed -i '' "s|</channel>|${NEW_ITEM}\n    </channel>|" "$WORK_DIR/old-appcast.xml"
            cp "$WORK_DIR/old-appcast.xml" "$WORK_DIR/appcast.xml"
          else
            cp $RUNNER_TEMP/appcast.xml "$WORK_DIR/appcast.xml"
          fi

          cd "$WORK_DIR"
          git init
          git checkout -b gh-pages
          git add appcast.xml
          git commit -m "Update appcast for v${{ steps.version.outputs.VERSION }}"
          git remote add origin "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"
          git push origin gh-pages --force

      - name: Cleanup keychain
        if: always()
        run: security delete-keychain $RUNNER_TEMP/signing.keychain-db 2>/dev/null || true
